<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit & Info Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        /* Checkboard pattern for transparency indication if needed, though mostly dark mode */
    </style>
</head>

<body class="bg-slate-900 text-slate-100">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-presets="react" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            Lightbulb,
            Tv,
            Zap,
            Layers,
            ChevronRight,
            ChevronLeft,
            Play,
            Pause,
            Info,
            Target,
            Sparkles
        } from 'lucide-react';

        const App = () => {
            const [currentScene, setCurrentScene] = useState(0);

            const scenes = [
                { title: "1. 灯泡宇宙", component: <BulbUniverse /> },
                { title: "2. 状态爆炸", component: <BulbScaling /> },
                { title: "3. 灰度秘密", component: <GrayscaleSecret /> },
                { title: "4. 橙色实验室", component: <RGBExplosion /> },
                { title: "5. 声波采样", component: <SoundSampling /> },
                { title: "6. 位深的魔法", component: <SoundBitDepth /> },
                { title: "7. 终极进化", component: <UltimateEvolution /> }
            ];

            return (
                <div className="flex flex-col h-screen bg-slate-900 text-slate-100 font-sans overflow-hidden">
                    {/* Header */}
                    <header className="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shadow-lg z-20">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-600 rounded-lg shadow-lg shadow-blue-500/20">
                                <Zap size={20} />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight uppercase tracking-[0.2em]">Bit & Info Explorer</h1>
                        </div>
                        <div className="text-sm font-mono text-blue-400 font-bold bg-slate-900 px-3 py-1 rounded-full border border-blue-900/30">
                            Scene {currentScene + 1} / {scenes.length}
                        </div>
                    </header>

                    {/* Main Stage */}
                    <main className="flex-1 relative p-4 md:p-8 flex items-center justify-center overflow-auto">
                        <div className="w-full max-w-5xl transition-all duration-500">
                            {scenes[currentScene].component}
                        </div>
                    </main>

                    {/* Footer Navigation */}
                    <footer className="p-6 bg-slate-800 border-t border-slate-700 flex justify-between items-center z-20">
                        <button onClick={() => setCurrentScene(prev => Math.max(0, prev - 1))}
                            disabled={currentScene === 0}
                            className="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-700 hover:bg-slate-600
                            disabled:opacity-30 transition-all border border-slate-600 shadow-lg"
                        >
                            <ChevronLeft size={20} /> 上一步
                        </button>

                        <div className="flex gap-2">
                            {scenes.map((_, idx) => (
                                <div key={idx} className={`h-2 rounded-full transition-all duration-300 ${idx === currentScene
                                    ? 'bg-blue-500 w-12' : 'bg-slate-700 w-4'}`} />
                            ))}
                        </div>

                        <button onClick={() => setCurrentScene(prev => Math.min(scenes.length - 1, prev + 1))}
                            disabled={currentScene === scenes.length - 1}
                            className="flex items-center gap-2 px-6 py-2 rounded-full bg-blue-600 hover:bg-blue-500 disabled:opacity-30
                            transition-all shadow-lg shadow-blue-900/20"
                        >
                            下一步
                            <ChevronRight size={20} />
                        </button>
                    </footer>
                </div>
            );
        };

        /* --- Scene 1: Bulb Universe (修复了开关逻辑) --- */
        const BulbUniverse = () => {
            const [isOn, setIsOn] = useState(false);
            return (
                <div className="text-center space-y-8 animate-in fade-in zoom-in duration-500">
                    <h2 className="text-3xl font-bold text-blue-300 italic underline decoration-blue-500/30 underline-offset-8">信息的原子：1 bit</h2>
                    <div className="relative p-16 rounded-full bg-slate-800 border-4 border-slate-700 inline-block group cursor-pointer"
                        onClick={() => setIsOn(!isOn)}>
                        <div className={`absolute inset-0 bg-yellow-400/10 blur-3xl rounded-full scale-150 transition-opacity
                            duration-500 ${isOn ? 'opacity-100' : 'opacity-0'}`} />
                        <Lightbulb size={120} className={`${isOn ? 'text-yellow-400 fill-yellow-400' : 'text-slate-600'} transition-all
                            duration-300 relative z-10`} />
                    </div>
                    <div className="text-5xl font-mono font-black text-white">状态：{isOn ? '1 (开)' : '0 (关)'}</div>
                    <p className="text-slate-400 max-w-md mx-auto italic text-lg leading-relaxed">
                        这是信息的起点。只要能表示“两种状态”，计算机就能以此描述整个世界。
                    </p>
                </div>
            );
        };

        /* --- Scene 2: Scaling (修复了多开关逻辑) --- */
        const BulbScaling = () => {
            const [count, setCount] = useState(1);
            const [activeBulbs, setActiveBulbs] = useState(new Array(8).fill(false));

            const toggleBulb = (i) => {
                const next = [...activeBulbs];
                next[i] = !next[i];
                setActiveBulbs(next);
            };

            return (
                <div className="grid md:grid-cols-2 gap-12 items-stretch">
                    <div className="space-y-6 flex flex-col justify-center">
                        <h2 className="text-3xl font-bold">位数 = 可能性</h2>
                        <p className="text-slate-400 text-lg">多一个 Bit，代表我们在“尺子”上多了一倍的刻度。</p>
                        <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 space-y-6 flex-1 flex flex-col justify-center">
                            <input type="range" min="1" max="8" value={count} onChange={(e) => setCount(parseInt(e.target.value))}
                                className="w-full h-3" />
                            <div className="grid grid-cols-4 gap-4">
                                {Array.from({ length: count }).map((_, i) => (
                                    <div key={i} onClick={() => toggleBulb(i)}
                                        className={`p-4 rounded-xl border-2 transition-all cursor-pointer flex justify-center
                                    ${activeBulbs[i] ? 'bg-yellow-500/20 border-yellow-400 shadow-[0_0_10px_rgba(234,179,8,0.2)]' :
                                                'bg-slate-900 border-slate-700'}`}
                                    >
                                        <Lightbulb size={24} className={activeBulbs[i] ? 'text-yellow-400 fill-yellow-400'
                                            : 'text-slate-600'} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="p-10 bg-blue-600/10 rounded-[2.5rem] border border-blue-500/20 text-center shadow-2xl flex flex-col justify-center h-full">
                        <div className="text-blue-400 font-bold tracking-widest mb-4 uppercase">状态总数 (2ⁿ)</div>
                        <div className="text-8xl font-black text-blue-500">2<sup>{count}</sup> = {Math.pow(2, count)}</div>
                    </div>
                </div>
            );
        };

        const GrayscaleSecret = () => {
            const [bits, setBits] = useState(1);
            const levels = Math.pow(2, bits);
            return (
                <div className="space-y-8 text-center max-w-3xl mx-auto">
                    <h2 className="text-3xl font-bold">灰度秘密：Bit 越多，台阶越细</h2>
                    <input type="range" min="1" max="8" value={bits} onChange={(e) => setBits(parseInt(e.target.value))}
                        className="w-full" />
                    <div className="h-32 w-full rounded-2xl overflow-hidden border-4 border-slate-700 flex shadow-2xl">
                        {Array.from({ length: levels }).map((_, i) => (
                            <div key={i} style={{
                                backgroundColor: `rgb(${(i / (levels - 1)) * 255}, ${(i / (levels - 1)) * 255},
                            ${(i / (levels - 1)) * 255})`, flex: 1
                            }} />
                        ))}
                    </div>
                    <p className="text-blue-400 font-mono font-bold text-xl">{levels} 个灰度层级</p>
                </div>
            );
        };

        /* --- Scene 4: RGB Explosion (修复匹配逻辑，增加忠实度对比) --- */
        const RGBExplosion = () => {
            const [bitDepth, setBitDepth] = useState(1);
            const levels = Math.pow(2, bitDepth);

            const orangePresets = [
                { name: "经典橙", r: 255, g: 165, b: 0, desc: "R(255) G(165) B(0)" },
                { name: "夕阳橙", r: 255, g: 100, b: 0, desc: "R(255) G(100) B(0)" },
                { name: "珊瑚橙", r: 255, g: 127, b: 80, desc: "R(255) G(127) B(80)" }
            ];

            const [target, setTarget] = useState(orangePresets[0]);
            const [indices, setIndices] = useState({ r: 0, g: 0, b: 0 });

            const getRGBValue = (index) => Math.round((index / (levels - 1)) * 255);
            const currentR = getRGBValue(indices.r);
            const currentG = getRGBValue(indices.g);
            const currentB = getRGBValue(indices.b);

            const displayColor = `rgb(${currentR}, ${currentG}, ${currentB})`;
            const targetColor = `rgb(${target.r}, ${target.g}, ${target.b})`;

            // 计算匹配度：对比当前量化颜色与真实 24-bit 目标色的差距
            const diff = Math.abs(currentR - target.r) + Math.abs(currentG - target.g) + Math.abs(currentB - target.b);
            // 匹配度现在更真实：在低位深下，即使你选到了最接近的色，匹配度也很难达到 100%
            const match = Math.max(0, 100 - (diff / 765) * 100);

            const updateIndex = (channel, val) => {
                let num = parseInt(val) || 0;
                num = Math.min(Math.max(0, num), levels - 1);
                setIndices(prev => ({ ...prev, [channel]: num }));
            };

            return (
                <div className="space-y-6">
                    <div className="text-center">
                        <h2 className="text-3xl font-bold mb-1">橙色实验室：调色的真相</h2>
                        <p className="text-slate-400 italic">“为什么调不准？因为低位深缺失了现实世界中微妙的中间色。”</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 items-start">
                        <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-6 shadow-2xl">
                            <div className="space-y-3">
                                <div className="text-xs font-bold text-slate-500 uppercase flex items-center gap-2 tracking-widest">
                                    <Target size={14} /> 选择目标橙色
                                </div>
                                <div className="flex gap-2">
                                    {orangePresets.map(p => (
                                        <button key={p.name} onClick={() => setTarget(p)}
                                            className={`flex-1 p-2 rounded-xl text-xs font-bold transition-all border ${target.name ===
                                                p.name ? 'bg-orange-600 border-orange-400 text-white' : 'bg-slate-900 border-slate-700 text-slate-500'}`}
                                        >
                                            {p.name}
                                        </button>
                                    ))}
                                </div>
                                <div className="text-[10px] text-slate-500 font-mono text-center">理想值：{target.desc}</div>
                            </div>

                            <div className="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-700">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">位深: {bitDepth} Bit</span>
                                <div className="flex gap-1">
                                    {[1, 2, 4, 8].map(d => (
                                        <button key={d} onClick={() => setBitDepth(d)} className={`px-3 py-1 rounded-lg text-xs font-mono
                                        transition-all border ${bitDepth === d ? 'bg-blue-600 border-blue-400 text-white' :
                                                'bg-slate-700 text-slate-400'}`}>
                                            {d}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-4">
                                {[['R', 'indices.r', 'r', 'bg-red-500'], ['G', 'indices.g', 'g', 'bg-green-500'], ['B', 'indices.b',
                                    'b', 'bg-blue-500']].map(([label, _, key, bgColor]) => (
                                        <div key={label} className="bg-slate-900/40 p-3 rounded-2xl border border-slate-700/30">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-sm flex items-center gap-2">
                                                    <div className={`w-2 h-2 rounded-full ${bgColor}`} /> {label} 通道
                                                </span>
                                                <div className="flex items-center gap-1">
                                                    <span className="text-[10px] text-slate-500">索引:</span>
                                                    <input type="number" min="0" max={levels - 1} value={indices[key]} onChange={(e) =>
                                                        updateIndex(key, e.target.value)}
                                                        className="w-12 bg-slate-800 border border-slate-600 rounded text-center text-xs font-mono
                                            text-blue-400 outline-none"
                                                    />
                                                </div>
                                            </div>

                                            <div
                                                className="relative h-6 bg-slate-900 rounded overflow-hidden border border-slate-700 cursor-pointer">
                                                <div className="absolute inset-0 flex">
                                                    {Array.from({ length: levels }).map((_, i) => (
                                                        <div key={i} className={`flex-1 border-r border-white/5 ${indices[key] === i ? 'bg-white/10'
                                                            : ''}`} />
                                                    ))}
                                                </div>
                                                <input type="range" min="0" max={levels - 1} value={indices[key]} onChange={(e) =>
                                                    updateIndex(key, e.target.value)}
                                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"
                                                />
                                                <div className={`absolute top-0 bottom-0 ${bgColor} opacity-80 transition-all duration-150
                                            pointer-events-none z-10`} style={{
                                                        left: `${(indices[key] / levels) * 100}%`, width: `${(1
                                                            / levels) * 100}%`
                                                    }} />
                                            </div>
                                        </div>
                                    ))}
                            </div>

                            <div
                                className="bg-blue-900/20 p-4 rounded-2xl border border-blue-500/20 text-center relative overflow-hidden">
                                <div
                                    className="text-xs text-blue-400 font-bold uppercase mb-1 flex justify-center gap-2 items-center relative z-10">
                                    <Sparkles size={14} /> 与现实世界的匹配度
                                </div>
                                <div className="text-4xl font-black text-white relative z-10">{match.toFixed(1)}%</div>
                                <div className="w-full bg-slate-700 h-1.5 rounded-full mt-2 overflow-hidden relative z-10">
                                    <div className="h-full bg-blue-500 transition-all duration-500" style={{ width: `${match}%` }} />
                                </div>
                                {match < 95 && (<div className="mt-2 text-[10px] text-blue-300 italic relative z-10">
                                    提示：由于 Bit 数太低，你可能永远调不到 100%
                                </div>
                                )}
                            </div>
                        </div>

                        <div className="flex flex-col items-center justify-center space-y-6 pt-6">
                            <div className="relative group">
                                <div className="flex flex-col items-center">
                                    <div className="text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">当前调出的颜色</div>
                                    <div className="w-56 h-56 rounded-[3.5rem] shadow-2xl border-8 border-slate-800 transition-all duration-300"
                                        style={{ backgroundColor: displayColor }} />
                                </div>
                                <div className="mt-8 flex flex-col items-center">
                                    <div className="text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest italic">现实世界的目标橙色</div>
                                    <div className="w-32 h-32 rounded-3xl border-4 border-dashed border-slate-700" style={{
                                        backgroundColor: targetColor
                                    }} />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SoundSampling = () => {
            const canvasRef = useRef(null);
            const [samplingRate, setSamplingRate] = useState(20);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frame;
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.beginPath(); ctx.strokeStyle = '#475569'; ctx.lineWidth = 1;
                    for (let x = 0; x < canvas.width; x++) { ctx.lineTo(x, canvas.height / 2 + Math.sin(x * 0.02) * 80); } ctx.stroke(); const
                        step = canvas.width / samplingRate; for (let x = 0; x <= canvas.width; x += step) {
                            const y = canvas.height / 2 + Math.sin(x *
                                0.02) * 80; ctx.beginPath(); ctx.strokeStyle = '#3b82f633'; ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                            ctx.stroke(); ctx.beginPath(); ctx.fillStyle = '#3b82f6'; ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
                        }
                    frame = requestAnimationFrame(render);
                }; render(); return () => cancelAnimationFrame(frame);
            }, [samplingRate]);

            return (
                <div className="space-y-6 text-center">
                    <h2 className="text-3xl font-bold text-blue-300">采样：时间被切碎了</h2>
                    <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-inner max-w-2xl mx-auto">
                        <canvas ref={canvasRef} width={800} height={300} className="w-full h-auto" />
                        <div className="mt-8 max-w-xs mx-auto space-y-2">
                            <div className="flex justify-between text-[10px] font-bold text-blue-400 uppercase tracking-widest">
                                <span>采样密度: {samplingRate}</span>
                            </div>
                            <input type="range" min="5" max="100" value={samplingRate} onChange={(e) =>
                                setSamplingRate(parseInt(e.target.value))} className="w-full" />
                        </div>
                    </div>
                </div>
            );
        };

        const SoundBitDepth = () => {
            const [bitDepth, setBitDepth] = useState(8);
            const [isPlaying, setIsPlaying] = useState(false);
            const audioCtxRef = useRef(null);
            const scriptNodeRef = useRef(null);
            const sourceRef = useRef(null);
            const gainRef = useRef(null);
            const bufferRef = useRef(null);
            const bitDepthRef = useRef(bitDepth);

            useEffect(() => {
                bitDepthRef.current = bitDepth;
            }, [bitDepth]);

            useEffect(() => {
                const loadAudio = async () => {
                    try {
                        const response = await fetch('./voice.wav');
                        const arrayBuffer = await response.arrayBuffer();
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        const ctx = new AudioContext();
                        const decodedBuffer = await ctx.decodeAudioData(arrayBuffer);
                        bufferRef.current = decodedBuffer;
                        await ctx.close();
                    } catch (error) {
                        console.error("Failed to load audio:", error);
                    }
                };
                loadAudio();
            }, []);

            const toggleAudio = async () => {
                if (isPlaying) {
                    sourceRef.current?.stop();
                    scriptNodeRef.current?.disconnect();
                    sourceRef.current?.disconnect();
                    gainRef.current?.disconnect();
                    setIsPlaying(false);
                } else {
                    if (!bufferRef.current) {
                        alert("Audio loading... please wait");
                        return;
                    }
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    const ctx = audioCtxRef.current;
                    if (ctx.state === 'suspended') {
                        await ctx.resume();
                    }

                    sourceRef.current = ctx.createBufferSource();
                    sourceRef.current.buffer = bufferRef.current;
                    sourceRef.current.loop = true;

                    // Create ScriptProcessor for Bit Crushing (Deprecated but easiest for standalone HTML without external worklet file)
                    // bufferSize: 4096
                    scriptNodeRef.current = ctx.createScriptProcessor(4096, 1, 1);

                    scriptNodeRef.current.onaudioprocess = (audioProcessingEvent) => {
                        const inputBuffer = audioProcessingEvent.inputBuffer;
                        const outputBuffer = audioProcessingEvent.outputBuffer;
                        const inputData = inputBuffer.getChannelData(0);
                        const outputData = outputBuffer.getChannelData(0);

                        const depth = bitDepthRef.current;
                        const levels = Math.pow(2, depth);

                        for (let i = 0; i < inputBuffer.length; i++) {
                            // Quantize the signal
                            // 1. Normalize to 0..1 (approx) or just preserve sign
                            // Simple bit crusher logic:
                            let sample = inputData[i];

                            // Quantize using round for symmetric distribution
                            const quantized = Math.round((sample + 1) * (levels - 1) / 2);
                            sample = (quantized * 2 / (levels - 1)) - 1;

                            // Soft clip to prevent exploding ears if math goes wrong
                            if (sample > 1) sample = 1;
                            if (sample < -1) sample = -1;

                            outputData[i] = sample;
                        }
                    };

                    gainRef.current = ctx.createGain();
                    gainRef.current.gain.value = 0.5;

                    sourceRef.current.connect(scriptNodeRef.current);
                    scriptNodeRef.current.connect(gainRef.current);
                    gainRef.current.connect(ctx.destination);

                    sourceRef.current.start();
                    setIsPlaying(true);
                }
            };

            // Cleanup
            useEffect(() => {
                return () => {
                    if (sourceRef.current) sourceRef.current.stop();
                    if (audioCtxRef.current) audioCtxRef.current.close();
                };
            }, []);

            return (
                <div className="space-y-12 text-center">
                    <h2 className="text-3xl font-bold italic underline decoration-blue-500 underline-offset-8">位深：记录刻度的精度</h2>
                    <div
                        className="max-w-xl mx-auto p-12 bg-blue-600/5 rounded-[4rem] border border-blue-500/10 shadow-2xl relative group">
                        <button
                            onClick={toggleAudio}
                            className={`mb-8 p-6 rounded-full transition-all duration-300 shadow-xl ${isPlaying
                                ? 'bg-red-500 hover:bg-red-600 shadow-red-500/30 animate-pulse'
                                : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/30'}`}
                        >
                            {isPlaying ? <Pause size={48} fill="currentColor" /> : <Play size={48} fill="currentColor" className="ml-2" />}
                        </button>

                        <p className="text-2xl font-serif italic text-blue-100 leading-relaxed px-4">
                            “点击播放，倾听<span className="text-blue-400 font-black px-2 text-3xl">{bitDepth} Bit</span>的声音：<br />
                            <span className="opacity-80">
                                {bitDepth === 1 ? "全是噪音，像坏掉的对讲机" :
                                    bitDepth < 4 ? "充满机械感的杂音" :
                                        "原来清晰的声音"}
                            </span>”
                        </p>

                        <div className="mt-8 bg-slate-800 p-6 rounded-2xl border border-slate-700">
                            <input
                                type="range" min="1" max="8" step="1"
                                value={bitDepth}
                                onChange={(e) => setBitDepth(parseInt(e.target.value))}
                                className="w-full h-4 bg-slate-900 rounded-full appearance-none cursor-pointer accent-blue-500"
                            />
                            <div className="flex justify-between mt-2 text-xs text-slate-500 font-mono">
                                <span>1 Bit (2 Level)</span>
                                <span>8 Bit (256 Level)</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* --- Scene 7: Ultimate Evolution (CSS Steps 动画) --- */
        const UltimateEvolution = () => {
            const [bitDepth, setBitDepth] = useState(1);
            const levels = Math.pow(2, bitDepth);

            return (
                <div className="space-y-8 animate-in fade-in duration-700">
                    <div className="text-center">
                        <h2 className="text-4xl font-black mb-2 tracking-tighter">终极对比：幻觉即现实</h2>
                        <p className="text-slate-400">拉动滑块看进化：从 2 级精度到 256 级精度的丝滑转变。</p>
                    </div>

                    <div
                        className="bg-slate-950 rounded-[3rem] border-4 border-slate-800 shadow-2xl relative overflow-hidden h-72 flex items-center px-10">
                        <div className="absolute inset-0 flex pointer-events-none opacity-5">
                            {Array.from({ length: levels }).map((_, i) => (
                                <div key={i} className="flex-1 border-r border-white" />
                            ))}
                        </div>

                        <div className="w-full relative h-32 flex items-center">
                            <div key={bitDepth} className="absolute shadow-2xl transition-all duration-300" style={{
                                width: bitDepth
                                    < 3 ? '100px' : '80px', height: bitDepth < 3 ? '100px' : '80px', borderRadius: bitDepth < 4
                                        ? '4px' : '50%', backgroundColor: 'var(--ball-color)', boxShadow: bitDepth > 4 ? `0 0 50px
                                var(--ball-color)` : 'none',
                                animation: `moveAcross 4s infinite alternate linear`,
                                animationTimingFunction: `steps(${levels - 1})`,
                                filter: bitDepth < 3 ? 'contrast(200%)' : 'none', '--ball-color': bitDepth < 2 ? '#ff4400' :
                                    (bitDepth < 4 ? '#ffaa00' : '#3b82f6')
                            }}>
                                {bitDepth < 3 && (<div
                                    className="absolute inset-0 flex items-center justify-center font-mono font-black text-white text-[10px] opacity-40">
                                    {bitDepth} Bit
                                </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="bg-slate-800 p-8 rounded-[2.5rem] border border-slate-700 shadow-xl space-y-6">
                        <div className="flex justify-between items-end">
                            <div className="space-y-1">
                                <div className="text-blue-500 font-black text-6xl">{bitDepth} Bit</div>
                                <div className="text-xs text-slate-500 font-bold uppercase tracking-widest">量化级别</div>
                            </div>
                            <div className="text-right space-y-1">
                                <div className="text-2xl font-mono text-white tracking-tighter">{levels} 级精度</div>
                            </div>
                        </div>

                        <input type="range" min="1" max="8" value={bitDepth} onChange={(e) => setBitDepth(parseInt(e.target.value))}
                            className="w-full h-4 bg-slate-900 rounded-full appearance-none cursor-pointer accent-blue-500"
                        />
                    </div>

                    <style dangerouslySetInnerHTML={{
                        __html: ` @keyframes moveAcross { from { left: 0%; transform: translateX(0%); } to
                    { left: 100%; transform: translateX(-100%); } } `}} />

                    <div
                        className="p-10 rounded-[2.5rem] bg-gradient-to-r from-blue-600/10 to-purple-600/10 border border-white/5 text-center">
                        <p className="text-2xl italic font-serif leading-relaxed text-slate-300">
                            “当数字的密度高到骗过眼睛，<br />
                            <span className="text-white font-black underline decoration-blue-500 underline-offset-8">0 和
                                1，就变成了现实。</span>”
                        </p>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>

</html>
