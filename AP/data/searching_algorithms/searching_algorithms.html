        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --bg-top: #08121e;
            --bg-mid: #0f2135;
            --bg-bot: #050a11;
            --panel: rgba(8, 18, 31, 0.78);
            --panel-border: rgba(148, 163, 184, 0.16);

            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.24), transparent 28%),

            content: "";

            inset: 0;

        .code-font {

        }

        .glass-panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(16px);
            box-shadow: 0 18px 60px rgba(2, 6, 23, 0.28);

        .scene-enter {
            animation: sceneEnter 0.45s ease-out forwards;
        }

        @keyframes sceneEnter {

                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;

            }
        }

            display: inline-flex;

            gap: 0.5rem;
            border-radius: 0.95rem;
            border: 1px solid rgba(148, 163, 184, 0.15);

        }

        }

            border-color: rgba(56, 189, 248, 0.45);

            border-color: rgba(56, 189, 248, 0.42);

        }
    </style>

        const DISPATCH_CASES = [
            {
                title: 'Coach Jersey Bin',
                prompt: 'PE 老师要在一堆 8 件乱序球衣里临时找 1 件，而且今天只查这一次。',
                ordered: false,

            },
            {

                prompt: '图书管理员每小时都要在一排短短的乱序预约书架上重复同样的查找步骤。',
                ordered: false,

                ordered: true,

            },
            {

                prompt: '辅导员拿着一张已经按字母排序的 12 人名单，课堂上只需做 1 次人工核对。',
                ordered: true,

                strategy: 'Linear Search',
                procedure: 'No',
                whyStrategy: '即使有序，规模很小且只查一次，直接线性扫描更简单。',

            }
        ];

        function linearSearchResult(list, target) {
            for (let i = 0; i < list.length; i += 1) {
                if (list[i] === target) {
                    return { index: i, steps: i + 1 };
                }
            }
            return { index: -1, steps: list.length };
        }

        function binarySearchSummary(list, target) {
            let low = 0;
            let high = list.length - 1;
            let steps = 0;

            while (low <= high) {
                const mid = Math.floor((low + high) / 2);
                steps += 1;
                if (list[mid] === target) {
                    return { index: mid, steps };
                }
                if (list[mid] < target) {
                    low = mid + 1;
                } else {
                    high = mid - 1;
                }
            }

            return { index: -1, steps };
        }

        function getBinaryConsoleTarget(size, caseIndex) {
            if (caseIndex === 0) {
                return { label: 'Near Start', value: 2 };
            }
            if (caseIndex === 1) {
                return { label: 'Middle', value: Math.ceil(size / 2) };
            }
            if (caseIndex === 2) {
                return { label: 'Near End', value: size - 1 };
            }
            return { label: 'Missing', value: size + 4 };
        }

        const Card = ({ children, className = '' }) => (
            <div className={`glass-panel rounded-[28px] border p-6 ${className}`}>

            </div>
        );

        const SectionEyebrow = ({ children }) => (

        const MetricCard = ({ label, value, tone = 'sky', note }) => (

                <div className="mt-2 text-2xl font-bold text-white">{value}</div>
                {note ? <div className="mt-1 text-xs text-slate-400">{note}</div> : null}
            </div>
        );

        const ReferenceCard = ({ title, lines, note }) => (

                <SectionEyebrow>AP Reference</SectionEyebrow>
                <div className="mb-4 flex items-center gap-3">
                    <Terminal size={18} className="text-sky-300" />

                <div className="code-font space-y-2 rounded-2xl bg-slate-950/90 p-4 text-sm text-slate-200">
                    {lines.map((line, index) => (

                    ))}
                </div>
                {note ? <p className="mt-4 text-sm leading-relaxed text-slate-400">{note}</p> : null}
            </Card>
        );

        const SearchDeskOverflow = () => {
            const [isExtracted, setIsExtracted] = useState(false);
            const [target, setTarget] = useState('Mia Lopez');
            const [strategy, setStrategy] = useState('Linear Search');

            const resultFor = (roster) => (
                strategy === 'Binary Search'
                    ? binarySearchSummary(roster.students, target)
                    : linearSearchResult(roster.students, target)
            );

            return (
                <div className="scene-enter grid grid-cols-1 gap-6 xl:grid-cols-[1.1fr_0.9fr]">
                    <Card>
                        <SectionEyebrow>Scene 1 · Search Desk Overflow</SectionEyebrow>
                        <div className="mb-6 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
                            <div>
                                <h2 className="text-3xl font-bold text-white">把三份重复查找，压缩成一个 Procedure</h2>
                                <p className="mt-2 max-w-3xl text-sm leading-relaxed text-slate-400">三个校园服务台都在做“查学生名单”这件事。先看到冗余，再把它折叠成统一接口。</p>
                            </div>
                            <div className="flex flex-wrap gap-3">
                                <button onClick={() => setIsExtracted((value) => !value)} className={`control-btn ${isExtracted ? 'active' : 'primary'}`}>
                                    <Box size={18} />
                                    {isExtracted ? 'Show Raw Code' : 'Extract Procedure'}
                                </button>
                                <button
                                    onClick={() => setStrategy((value) => value === 'Linear Search' ? 'Binary Search' : 'Linear Search')}
                                    disabled={!isExtracted}
                                    className={`control-btn ${strategy === 'Binary Search' ? 'active' : ''}`}
                                >
                                    <RefreshCw size={18} />
                                    {strategy === 'Linear Search' ? 'Upgrade to Binary' : 'Use Linear Again'}
                                </button>
                            </div>
                        </div>

                        <div className="mb-5 flex flex-col gap-4 rounded-[24px] border border-slate-800 bg-slate-950/60 p-4 lg:flex-row lg:items-center">
                            <label className="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Shared Target Parameter</label>
                            <div className="flex flex-wrap gap-2">
                                {PROCEDURE_TARGETS.map((name) => (
                                    <button
                                        key={name}
                                        onClick={() => setTarget(name)}
                                        className={`rounded-full px-4 py-2 text-sm font-bold transition ${target === name ? 'bg-sky-500/20 text-sky-200 ring-1 ring-sky-500/40' : 'bg-slate-900 text-slate-300 ring-1 ring-slate-800 hover:text-white'}`}
                                    >
                                        {name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="rounded-[24px] border border-slate-800 bg-slate-950/70 p-5">
                            {!isExtracted ? (
                                <div className="grid gap-4 lg:grid-cols-3">
                                    {PROCEDURE_ROSTERS.map((roster) => (
                                        <div key={roster.id} className="rounded-[22px] border border-slate-800 bg-slate-900/70 p-4">
                                            <div className="mb-3 text-sm font-bold text-white">{roster.desk}</div>
                                            <div className="code-font space-y-2 text-[12px] text-slate-300">
                                                <div>FOR EACH student IN {roster.rosterName}</div>
                                                <div className="pl-4">IF student = "{target}"</div>
                                                <div className="pl-8 text-emerald-300">RETURN "FOUND"</div>
                                                <div>RETURN "NOT FOUND"</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="grid gap-6 xl:grid-cols-[0.95fr_1.05fr]">
                                    <div className="rounded-[22px] border border-sky-500/20 bg-sky-500/5 p-5">
                                        <div className="mb-3 flex items-center gap-2 text-sky-300">
                                            <Code2 size={18} />
                                            <span className="text-sm font-bold uppercase tracking-[0.18em]">Procedure Body</span>
                                        </div>
                                        <div className="code-font space-y-2 text-sm text-slate-200">
                                            <div><span className="text-fuchsia-300">PROCEDURE</span> searchRoster(target, roster)</div>
                                            {strategy === 'Linear Search' ? (
                                                <React.Fragment>
                                                    <div className="pl-4">FOR EACH student IN roster</div>
                                                    <div className="pl-8">IF student = target</div>
                                                    <div className="pl-12 text-emerald-300">RETURN "FOUND"</div>
                                                    <div className="pl-4">RETURN "NOT FOUND"</div>
                                                </React.Fragment>
                                            ) : (

                                            )}
                                        </div>

                                            调用方式保持不变，但内部策略可以升级。这一幕把“抽象”和“搜索策略”第一次连接起来。
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        {PROCEDURE_ROSTERS.map((roster) => {
                                            const result = resultFor(roster);
                                            return (
                                                <div key={roster.id} className="rounded-[22px] border border-slate-800 bg-slate-900/70 p-4">
                                                    <div className="mb-3 flex items-center justify-between">
                                                        <div>
                                                            <div className="text-sm font-bold text-white">{roster.short}</div>
                                                            <div className="text-xs text-slate-500">{roster.rosterName}</div>
                                                        </div>
                                                        <div className="rounded-full bg-slate-950 px-3 py-1 text-xs font-bold text-slate-400">
                                                            call site unchanged
                                                        </div>
                                                    </div>
                                                    <div className="code-font rounded-2xl bg-slate-950/90 px-4 py-3 text-sm text-slate-200">
                                                        searchRoster("{target}", {roster.rosterName})
                                                    </div>
                                                    <div className="mt-3 flex flex-wrap gap-3">
                                                        <span className={`rounded-full px-3 py-1 text-xs font-bold ${result.index >= 0 ? 'bg-emerald-500/15 text-emerald-300' : 'bg-rose-500/15 text-rose-300'}`}>
                                                            {result.index >= 0 ? `FOUND @ ${result.index}` : 'NOT FOUND'}
                                                        </span>
                                                        <span className="rounded-full bg-sky-500/15 px-3 py-1 text-xs font-bold text-sky-200">
                                                            {strategy}: {result.steps} step{result.steps > 1 ? 's' : ''}
                                                        </span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </Card>

                    <div className="grid gap-6">
                        <ReferenceCard
                            title="Calling Procedures"
                            lines={[
                                'PROCEDURE searchRoster(target, roster)',
                                '  ... search logic ...',
                                'RETURN result',

                                'result <- searchRoster(target, roster)'

                            note="APCSP 里 procedure 的重点是接口、参数和复用。学生不需要一开始就知道内部所有细节。"
                        />

                            </p>

        };

        const UnsortedLostAndFound = () => {
            const [caseIndex, setCaseIndex] = useState(0);
            const [pointer, setPointer] = useState(0);
            const [currentIndex, setCurrentIndex] = useState(null);
            const [visited, setVisited] = useState([]);
            const [status, setStatus] = useState('ready');
            const [foundIndex, setFoundIndex] = useState(-1);
            const [steps, setSteps] = useState(0);
            const [isAuto, setIsAuto] = useState(false);

            const currentCase = LOST_CASES[caseIndex];

            const resetCase = () => {
                setPointer(0);
                setCurrentIndex(null);
                setVisited([]);
                setStatus('ready');
                setFoundIndex(-1);
                setSteps(0);
                setIsAuto(false);
            };

            useEffect(() => {
                resetCase();
            }, [caseIndex]);

            const stepSearch = () => {
                if (status === 'found' || status === 'not_found') {
                    return;
                }

                const item = currentCase.items[pointer];
                setCurrentIndex(pointer);
                setVisited((items) => [...items, pointer]);
                setSteps((value) => value + 1);

                if (item.label === currentCase.target) {
                    setFoundIndex(pointer);
                    setStatus('found');
                    setIsAuto(false);
                    return;
                }

                if (pointer === currentCase.items.length - 1) {
                    setStatus('not_found');
                    setIsAuto(false);
                    return;
                }

                setPointer((value) => value + 1);
                setStatus('running');
            };

            useEffect(() => {
                if (!isAuto || status === 'found' || status === 'not_found') {
                    return undefined;
                }
                const timer = setTimeout(() => {
                    stepSearch();
                }, 720);
                return () => clearTimeout(timer);
            }, [isAuto, pointer, status, caseIndex]);

            return (
                <div className="scene-enter grid grid-cols-1 gap-6 xl:grid-cols-[1.08fr_0.92fr]">
                    <Card>
                        <SectionEyebrow>Scene 2 · Unsorted Lost-and-Found</SectionEyebrow>
                        <div className="mb-6 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                            <div>
                                <h2 className="text-3xl font-bold text-white">乱序数据里，线性查找是最可靠的策略</h2>
                                <p className="mt-2 max-w-3xl text-sm leading-relaxed text-slate-400">没有排序线索时，扫描器只能从左到右一个个检查。你可以用固定案例感受首位命中、末位命中和未找到。</p>
                            </div>
                            <div className="flex flex-wrap gap-3">
                                <button onClick={resetCase} className="control-btn">
                                    <RotateCcw size={18} />
                                    Reset
                                </button>
                                <button onClick={stepSearch} disabled={status === 'found' || status === 'not_found' || isAuto} className="control-btn">
                                    <ArrowRight size={18} />
                                    Step
                                </button>
                                <button onClick={() => setIsAuto((value) => !value)} disabled={status === 'found' || status === 'not_found'} className={`control-btn ${isAuto ? 'active' : 'primary'}`}>
                                    <Play size={18} />
                                    {isAuto ? 'Pause' : 'Auto Run'}
                                </button>
                                <button onClick={() => setCaseIndex((value) => (value + 1) % LOST_CASES.length)} className="control-btn">
                                    <RefreshCw size={18} />
                                    New Case
                                </button>
                            </div>

                                            <button
                                                key={option}
                                                onClick={() => updateResponse('procedure', option)}
                                                className={`rounded-2xl px-4 py-3 text-sm font-bold transition ${
                                                    currentResponse.procedure === option
                                                        ? 'bg-amber-500/20 text-amber-200 ring-1 ring-amber-500/40'
                                                        : 'bg-slate-950 text-slate-300 ring-1 ring-slate-800 hover:text-white'
                                                }`}
                                            >
                                                {option}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </Card>

                    <div className="grid gap-6">
                        <ReferenceCard
                            title="Selection Heuristic"
                            lines={['1. Is the data sorted?', '2. How large is the list?', '3. Will this action repeat?', '4. Pick strategy, then pick abstraction.']}
                            note="先判断搜索前提，再判断是否值得封装成统一接口。这就是本章最后的迁移目标。"
                        />

                        <Card className={`${isReady && fullyCorrect ? 'border-emerald-500/25 bg-emerald-500/5' : isReady ? 'border-rose-500/25 bg-rose-500/5' : 'border-slate-800 bg-slate-900/60'}`}>
                            <SectionEyebrow>Dispatch Feedback</SectionEyebrow>
                            {!isReady ? (
                                <p className="text-sm leading-relaxed text-slate-300">
                                    先做出两个决定：`search strategy` 和 `procedure decision`。系统会立刻给出原因。
                                </p>
                            ) : (
                                <React.Fragment>
                                    <div className="mb-4 flex items-center gap-3">
                                        {fullyCorrect ? <CheckCircle2 size={22} className="text-emerald-300" /> : <XCircle size={22} className="text-rose-300" />}
                                        <div className="text-lg font-bold text-white">
                                            {fullyCorrect ? 'Both decisions fit the scenario.' : 'One or both decisions need a second look.'}
                                        </div>
                                    </div>
                                    <div className="space-y-3 text-sm text-slate-300">
                                        <div className={`rounded-2xl border p-4 ${strategyCorrect ? 'border-emerald-500/25 bg-emerald-500/10' : 'border-rose-500/25 bg-rose-500/10'}`}>
                                            <div className="font-bold text-white">Search Strategy</div>
                                            <div className="mt-2">正确答案：{currentCase.strategy}</div>
                                            <div className="mt-1 text-slate-400">{currentCase.whyStrategy}</div>
                                        </div>
                                        <div className={`rounded-2xl border p-4 ${procedureCorrect ? 'border-emerald-500/25 bg-emerald-500/10' : 'border-rose-500/25 bg-rose-500/10'}`}>
                                            <div className="font-bold text-white">Procedure Decision</div>
                                            <div className="mt-2">正确答案：{currentCase.procedure}</div>
                                            <div className="mt-1 text-slate-400">{currentCase.whyProcedure}</div>
                                        </div>
                                    </div>
                                </React.Fragment>
                            )}

                            <div className="mt-5 grid grid-cols-2 gap-3">
                                <MetricCard label="Completed Cases" value={`${completedCount}/${DISPATCH_CASES.length}`} />
                                <MetricCard label="Current Goal" value="Pick both" note="strategy + procedure" />
                            </div>

                            {completedCount === DISPATCH_CASES.length ? (
                                <div className="mt-5 rounded-2xl border border-sky-500/25 bg-sky-500/10 p-4 text-sm leading-relaxed text-sky-100">
                                    最终 takeaway：`searchStudent(target, roster)` 这样的接口可以保持不变，但它内部能根据数据条件使用不同策略。抽象和效率不是两门课，而是一件事。
                                </div>
                            ) : null}
                        </Card>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentScene, setCurrentScene] = useState(0);
            const scenes = [
                {
                    title: 'Search Desk Overflow',
                    subtitle: 'Procedure 把重复搜索收拢成统一接口',
                    objective: '理解 procedure 的价值是复用、参数化和隐藏实现',
                    component: <SearchDeskOverflow />
                },
                {
                    title: 'Unsorted Lost-and-Found',
                    subtitle: '乱序列表需要线性查找',
                    objective: '理解 FOR EACH 的扫描直觉，以及 not found 也是合法结果',
                    component: <UnsortedLostAndFound />
                },
                {
                    title: 'Sort or Fail Lab',
                    subtitle: 'Binary Search 依赖 Sorted Data',
                    objective: '纠正“binary 永远更快”的误区',
                    component: <SortOrFailLab />
                },
                {
                    title: 'Binary Command Console',
                    subtitle: '每次减半，让步数增长慢下来',
                    objective: '建立二分查找效率直觉，而不是死记实现',
                    component: <BinaryCommandConsole />
                },
                {
                    title: 'Strategy Dispatch',
                    subtitle: '根据情境选算法，再决定是否抽象',
                    objective: '完成 APCSP 风格迁移：接口设计 + 策略选择',
                    component: <StrategyDispatch />
                }
            ];

            return (
                <div className="flex h-screen flex-col overflow-hidden">
                    <header className="glass-panel relative z-10 border-b border-slate-800/90 px-5 py-4 md:px-8">
                        <div className="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
                            <div className="flex items-start gap-4">
                                <div className="rounded-2xl bg-sky-500/20 p-3 ring-1 ring-sky-500/30">
                                    <Search size={26} className="text-sky-300" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold tracking-tight text-white">校园搜寻中心：过程抽象与查找策略</h1>
                                    <p className="mt-1 text-sm text-slate-400">Search HQ: Procedures, Linear Search, Binary Search, and Strategy Selection</p>
                                </div>
                            </div>
                            <div className="grid gap-1 text-left xl:text-right">
                                <div className="text-[11px] font-bold uppercase tracking-[0.28em] text-slate-500">Scene Objective</div>
                                <div className="text-sm text-slate-300">{scenes[currentScene].objective}</div>
                            </div>
                        </div>
                        <div className="mt-5 flex flex-wrap gap-2">
                            {scenes.map((scene, index) => (
                                <button
                                    key={scene.title}
                                    onClick={() => setCurrentScene(index)}
                                    className={`rounded-full px-4 py-2 text-xs font-bold transition ${
                                        index === currentScene
                                            ? 'bg-sky-500/20 text-sky-200 ring-1 ring-sky-500/40'
                                            : 'bg-slate-950/70 text-slate-400 ring-1 ring-slate-800 hover:text-white'
                                    }`}
                                >
                                    {index + 1}. {scene.title}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto px-4 py-5 md:px-6 xl:px-8">
                        <div className="mx-auto w-full max-w-[1500px]">
                            <div className="mb-5 rounded-[28px] border border-slate-800 bg-slate-950/45 px-5 py-4">
                                <div className="text-[11px] font-bold uppercase tracking-[0.28em] text-slate-500">Current Scene</div>
                                <div className="mt-2 text-2xl font-bold text-white">{scenes[currentScene].subtitle}</div>
                            </div>
                            {scenes[currentScene].component}
                        </div>
                    </main>

                    <footer className="glass-panel border-t border-slate-800/90 px-5 py-4 md:px-8">
                        <div className="flex items-center justify-between gap-4">
                            <button onClick={() => setCurrentScene((value) => Math.max(0, value - 1))} disabled={currentScene === 0} className="control-btn">
                                <ChevronLeft size={18} />
                                Previous
                            </button>

                            <div className="hidden text-center md:block">
                                <div className="text-[11px] font-bold uppercase tracking-[0.28em] text-slate-500">Progress</div>
                                <div className="mt-2 flex gap-2">
                                    {scenes.map((scene, index) => (
                                        <div key={scene.title} className={`h-2 rounded-full transition-all ${index === currentScene ? 'w-12 bg-sky-400' : index < currentScene ? 'w-6 bg-slate-600' : 'w-6 bg-slate-800'}`} />
                                    ))}
                                </div>
                            </div>

                            <button onClick={() => setCurrentScene((value) => Math.min(scenes.length - 1, value + 1))} disabled={currentScene === scenes.length - 1} className="control-btn primary">
                                Next
                                <ChevronRight size={18} />
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
